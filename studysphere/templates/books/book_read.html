{% extends 'base.html' %} {% block title %}Reading: {{ book.title }} —
StudySphere{% endblock %} {% block extra_css %}
<style>
  body {
    background: #2b2b2b;
  }
  .reader-toolbar {
    background: var(--primary);
    color: #fff;
    padding: 0.6rem 1.2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
    border-radius: 10px;
    margin-bottom: 1rem;
  }
  .reader-toolbar .book-title {
    font-weight: 600;
    font-size: 0.95rem;
    flex-grow: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #pdf-canvas {
    display: block;
    margin: 0 auto;
    border-radius: 8px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    max-width: 100%;
  }
  .page-controls {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .page-controls input {
    width: 55px;
    text-align: center;
    border-radius: 6px;
    border: 1px solid rgba(255, 255, 255, 0.3);
    background: rgba(255, 255, 255, 0.1);
    color: #fff;
    padding: 0.25rem 0.4rem;
  }
  .page-controls input:focus {
    outline: none;
    border-color: var(--gold);
  }
  #loading-bar {
    position: fixed;
    top: 0;
    left: 0;
    height: 3px;
    background: var(--gold);
    width: 0%;
    transition: width 0.3s;
    z-index: 9999;
  }
</style>
{% endblock %} {% block content %}
<div id="loading-bar"></div>

<!-- Toolbar -->
<div class="reader-toolbar">
  <a
    href="{% url 'book_detail' book.pk %}"
    class="btn btn-sm btn-outline-light"
  >
    <i class="bi bi-arrow-left"></i>
  </a>
  <span class="book-title">{{ book.title }} — {{ book.course_code }}</span>

  <!-- Page Controls -->
  <div class="page-controls">
    <button
      class="btn btn-sm btn-outline-light"
      id="prev-btn"
      title="Previous page"
    >
      <i class="bi bi-chevron-left"></i>
    </button>
    <input type="number" id="page-input" value="{{ bookmark.page }}" min="1" />
    <span class="text-white-50 small">/ <span id="total-pages">—</span></span>
    <button
      class="btn btn-sm btn-outline-light"
      id="next-btn"
      title="Next page"
    >
      <i class="bi bi-chevron-right"></i>
    </button>
  </div>

  <!-- Zoom -->
  <div class="d-flex gap-1">
    <button class="btn btn-sm btn-outline-light" id="zoom-out">
      <i class="bi bi-dash"></i>
    </button>
    <button class="btn btn-sm btn-outline-light" id="zoom-in">
      <i class="bi bi-plus"></i>
    </button>
  </div>

  <!-- Save Bookmark -->
  <form method="post" id="bookmark-form" class="d-none">
    {% csrf_token %}
    <input type="hidden" name="page" id="bookmark-page-input" />
  </form>
  <button
    class="btn btn-sm btn-gold"
    id="save-btn"
    title="Save reading position"
  >
    <i class="bi bi-bookmark-check me-1"></i>Save
  </button>
</div>

<!-- PDF Canvas -->
<div class="text-center py-2">
  <canvas id="pdf-canvas"></canvas>
</div>
{% endblock %} {% block extra_js %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  const PDF_URL    = "{{ book.file.url }}";
  const SAVED_PAGE = {{ bookmark.page }};

  let pdfDoc    = null;
  let pageNum   = SAVED_PAGE;
  let scale     = 1.4;
  let rendering = false;

  const canvas    = document.getElementById('pdf-canvas');
  const ctx       = canvas.getContext('2d');
  const loadingBar = document.getElementById('loading-bar');

  function renderPage(num) {
      if (rendering) return;
      rendering = true;
      loadingBar.style.width = '40%';

      pdfDoc.getPage(num).then(page => {
          const viewport = page.getViewport({ scale });
          canvas.height  = viewport.height;
          canvas.width   = viewport.width;

          page.render({ canvasContext: ctx, viewport }).promise.then(() => {
              rendering = false;
              loadingBar.style.width = '100%';
              setTimeout(() => loadingBar.style.width = '0%', 400);

              document.getElementById('page-input').value = num;
              document.getElementById('bookmark-page-input').value = num;
          });
      });
  }

  // Load PDF
  pdfjsLib.getDocument(PDF_URL).promise.then(doc => {
      pdfDoc = doc;
      document.getElementById('total-pages').textContent = doc.numPages;
      renderPage(pageNum);
  });

  // Controls
  document.getElementById('prev-btn').addEventListener('click', () => {
      if (pageNum <= 1) return;
      pageNum--;
      renderPage(pageNum);
  });

  document.getElementById('next-btn').addEventListener('click', () => {
      if (pageNum >= pdfDoc.numPages) return;
      pageNum++;
      renderPage(pageNum);
  });

  document.getElementById('page-input').addEventListener('change', e => {
      const p = parseInt(e.target.value);
      if (p >= 1 && p <= pdfDoc.numPages) {
          pageNum = p;
          renderPage(pageNum);
      }
  });

  document.getElementById('zoom-in').addEventListener('click', () => {
      scale = Math.min(scale + 0.2, 3.0);
      renderPage(pageNum);
  });

  document.getElementById('zoom-out').addEventListener('click', () => {
      scale = Math.max(scale - 0.2, 0.6);
      renderPage(pageNum);
  });

  // Save bookmark
  document.getElementById('save-btn').addEventListener('click', () => {
      document.getElementById('bookmark-page-input').value = pageNum;
      document.getElementById('bookmark-form').submit();
  });

  // Auto-save bookmark every 2 minutes
  setInterval(() => {
      document.getElementById('bookmark-page-input').value = pageNum;
      fetch("{% url 'book_read' book.pk %}", {
          method: 'POST',
          headers: {
              'X-CSRFToken': '{{ csrf_token }}',
              'Content-Type': 'application/x-www-form-urlencoded',
          },
          body: `page=${pageNum}`
      });
  }, 120000);
</script>
{% endblock %}
